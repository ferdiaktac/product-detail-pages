<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Hizmet Yok</title>
    <!-- Taze Cicek CSS -->
    <link
      rel="stylesheet"
      href="https://www.tazecicek.com/assets/bundle.css?v=1750"
    />
    <link
      rel="stylesheet"
      href="https://www.tazecicek.com/assets/newmenu/css/style.css?v=1750"
    />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body style="margin-top: 48px; margin-bottom: 100px">
    <div class="urunmain">
      <div class="container">
        <div class="tc-product-page">
          <div class="row">
            <div class="col-md-6 col-sm-6">
              <img src="/tc-images-product-page/product-img.png" />
              <div class="tc-product-favorite-button-wrapper mobile">
                <div class="tc-product-favorite-button">
                  <img
                    src="/tc-images-product-page/tc-favorite-icon-active.svg"
                  />
                </div>
              </div>
            </div>
            <!-- Right Block -->
            <div class="col-md-6 col-sm-6" id="sagblokana">
              <div class="tc-product-details">
                <div class="tc-product-title">
                  <h1>Blushing Pink Mirage</h1>
                </div>
                <!-- Price -->
                <div class="tc-product-price-section">
                  <div class="tc-price">
                    <div class="tc-discount-percentage">32%</div>
                    <div class="tc-product-price-old">
                      2019<span>,00 TL</span>
                    </div>
                    <div class="tc-product-price-new">
                      1385<span>,00 TL</span>
                    </div>
                  </div>
                  <div class="tc-delivery-label">Ücretsiz Teslimat</div>
                </div>
                <div class="tc-product-destination-wrapper">
                  <div class="tc-product-destination-section">
                    <!-- Destination Input Selected -->
                    <div class="tc-product-destination">
                      <img
                        width="24"
                        height="24"
                        src="//tc-images-product-page/destination.svg"
                      />
                      <input
                        name="destination"
                        type="text"
                        value="Kavacık Mahallesi, Otağtepe Caddesi, No:34/1B, Beykoz/İstanbul"
                        class="form-control tc-destination-on"
                        placeholder="Mahalleyi, okul, hastane vb. yazın"
                        autocomplete="off"
                      />
                      <input
                        type="image"
                        name="tc-destination-close"
                        class="tc-destination-close"
                        src="//tc-images-product-page/tc-close.svg"
                      />
                    </div>
                  </div>
                </div>

                <!-- No Delivery -->
                <div class="tc-no-delivery">
                  <img
                    src="/tc-images-product-page/tc-warning.svg"
                    class="tc-warning-icon"
                  />
                  <div class="tc-no-delivery-content">
                    Bu bölgeye şu an için hizmet verememekteyiz. Lütfen farklı
                    bir adres giriniz.
                  </div>
                </div>

                <!-- Call to Actions -->
                <div class="tc-product-action-wrapper">
                  <!-- Buttons Desktop-->
                  <div class="tc-product-button-wrapper">
                    <button class="tc-product-button" type="button" disabled>
                      Sipariş Ver
                    </button>
                    <div class="tc-product-favorite-button-wrapper">
                      <div class="tc-product-favorite-button">
                        <img
                          src="/tc-images-product-page/tc-favorite-icon.svg"
                        />
                        <!-- <img
                          src="/tc-images-product-page/tc-favorite-icon-active.svg"
                        /> -->
                      </div>
                      <span>Bu Ürün<br />251057 Kişinin Favorisi</span>
                    </div>
                  </div>
                </div>

                <!-- Mobile Bottom Bar -->
                <div class="tc-product-mobile-bottom">
                  <div class="tc-price">
                    <div class="tc-discount-percentage">32%</div>
                    <div class="tc-bottom-price-wrapper">
                      <div class="tc-product-price-old">
                        2019<span>,00 TL</span>
                      </div>
                      <div class="tc-product-price-new">
                        1385<span>,00 TL</span>
                      </div>
                      <div class="free-delivery-label-mobile">
                        &amp; Ücretsiz Teslimat
                      </div>
                    </div>
                  </div>
                  <button class="tc-product-button" type="button" disabled>
                    Sipariş Ver
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="product-detail.js"></script>
  </body>
</html>
